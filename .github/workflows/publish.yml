name: Publish to PyPI

# Triggered by pushing a v* tag. Uses PyPI Trusted Publishing (OIDC).
#
# One-time PyPI configuration:
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a pending publisher for atomadic-nexus-sdk with:
#        owner:    atomadictech
#        repo:     atomadic-nexus-sdk
#        workflow: publish.yml
#        environment: pypi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/atomadic-nexus-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
